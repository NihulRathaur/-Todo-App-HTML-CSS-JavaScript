<!DOCTYPE html>
<html lang="en">
<head>
  <title>Todo App </title>
  <style>
    
    body{
      font-family: Arial, Helvetica, sans-serif;
      text-align: center;
    }

  
    .grid-container{
      display: grid;
      grid-template-columns: 200px 150px 100px;
      column-gap: 10px;
      row-gap: 10px;
      margin-top: 10px;
      align-items: center;
      
    }

    #todo-input, #todo-date{
      font-size: 15px;
      padding: 10px 5px;
    }

    .btn-todo{
      background-color: green;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      height: 40px;

    }

    .btn-delete{
      background-color: darkred;
      color: white;
      border: none;
      border-radius: 10px;
      height: 40px;
      cursor: pointer;


    }

  </style>
</head>
<body>
  
  <h1 id="main-heading">Todo App</h1>
  <div class="grid-container">
  <input type="text"  id="todo-input" placeholder="Enter todo here...">
  <input type="date"  id="todo-date">
  <button class="btn-todo" onclick="addTodo();">ADD</button>
  </div>
  <div class="todo-container grid-container"></div>



  <script>
let todoList=[
{
    item:'Buy milk',
    duedate:'18/07/2024'
},
{ 
    item:'Go to College',
    duedate:'24/05/26'  
}
];
displayItems();

    function addTodo(){
      let inputElement =document.querySelector('#todo-input');
      let dateElement =document.querySelector('#todo-date');
      let todoItem= inputElement.value;
      let tododate=dateElement.value;
      todoList.push({item:todoItem,duedate:tododate});
      inputElement.value='';
      dateElement.value='';
      

      displayItems();
    }

    function displayItems(){
      let containerElement=document.querySelector('.todo-container');


      let newHtml="";      
      containerElement.innerText='';
      for(let i=0;i<todoList.length;i++){  
         
        let {item,duedate}=todoList[i];
      newHtml += `
                
                <span>${item}</span>
                <span>${duedate}</span> 
                <button class='btn-delete' onclick="todoList.splice(${i},1);displayItems();">Delete</button>
                
                `;
      
        containerElement.innerHTML = newHtml;
      }


    };
    
  </script>
  
</body>
</html>
